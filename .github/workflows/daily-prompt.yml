name: 📧 PromptDaily 每日提示詞寄送

on:
  schedule:
    # 每天 UTC 21:00 = 台灣時間 05:00
    - cron: '0 21 * * *'
  workflow_dispatch:  # 允許手動觸發

jobs:
  scrape-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout 程式碼
        uses: actions/checkout@v4

      - name: 🟢 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 安裝依賴
        working-directory: ./scripts
        run: npm install

      - name: 🤖 執行爬蟲 + 寄信
        working-directory: ./scripts
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_TOKEN: ${{ secrets.APPS_SCRIPT_TOKEN }}
        run: node index.js --now

      - name: 🚀 發布最新資料至網頁
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git commit -m "Auto-update latest prompts [skip ci]" || echo "No changes to commit"
          git push

      - name: 💾 保存爬取記錄（除錯用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results-${{ github.run_number }}
          path: |
            scripts/last-scrape.json
            scripts/last-email.html
            data/latest.json
          retention-days: 7
